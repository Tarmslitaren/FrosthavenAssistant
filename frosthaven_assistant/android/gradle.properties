org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
#android.bundle.enableUncompressedNativeLibs=false --deprecated in gradle 8.x
# Kotlin incremental compilation fails on Windows when the pub cache (C:) and project (D:) are on different drives.
# RelocatableFileToPathConverter cannot compute relative paths across drive roots.
kotlin.incremental=false
